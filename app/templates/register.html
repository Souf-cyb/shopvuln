{% extends 'base.html' %}
{% block title %}Register{% endblock %}
{% block content %}

<div style="max-width:420px;margin:40px auto;">
    <div class="card">
        <div style="text-align:center;margin-bottom:28px;">
            <div style="font-size:36px;margin-bottom:8px;">✨</div>
            <h2 style="font-size:22px;font-weight:600;">Create account</h2>
            <p style="color:#94a3b8;font-size:13px;margin-top:4px;">Join the ShopVuln community</p>
        </div>

        {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;">
                Create Account
            </button>
        </form>

        <div style="text-align:center;margin-top:20px;font-size:13px;color:#94a3b8;">
            Already have an account?
            <a href="/login" style="color:#3b82f6;text-decoration:none;">Sign In</a>
        </div>
    </div>
</div>

{% endblock %}
